name: Generate Burndown Chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"   # todos os dias às 11h UTC, incluindo fim de semana
  issues:
    types:
      - opened
      - closed
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: write

jobs:
  burndown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests matplotlib numpy

      - name: Gerar gráfico Sprint 1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TZ: "America/Recife"
        run: |
          python burndown_generator.py \
            --token        "$GH_TOKEN" \
            --login        "pedroRMQ" \
            --org          "root-2026-1" \
            --project      3 \
            --start        "2026-04-28" \
            --end          "2026-05-12" \
            --points-label "size " \
            --output       burndown_sprint1.png

      - name: Commitar e publicar gráficos
        run: |
          git config --global user.name  "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git pull --rebase origin main
          git add -f burndown_sprint1.png 
          git commit -m "chore: atualiza burndown charts [skip ci]" || echo "Sem mudanças"
          git push
